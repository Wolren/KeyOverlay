name: Build & Release

on:
  push:
    branches: [ master ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 7
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'

      - name: Restore dependencies
        run: dotnet restore KeyOverlay/KeyOverlay.csproj

      - name: Build
        run: dotnet build KeyOverlay/KeyOverlay.csproj --configuration Release --no-restore /p:GeneratePackageOnBuild=false

      - name: Publish
        run: >
          dotnet publish KeyOverlay/KeyOverlay.csproj
          --configuration Release
          --runtime win-x64
          --self-contained false
          /p:GeneratePackageOnBuild=false
          --output publish/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: KeyOverlay-win-x64
          path: publish/
          retention-days: 14

  release:
    name: Release
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 7
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'

      - name: Publish release binary
        run: >
          dotnet publish KeyOverlay/KeyOverlay.csproj
          --configuration Release
          --runtime win-x64
          --self-contained false
          /p:GeneratePackageOnBuild=false
          --output publish/

      - name: Zip release
        shell: pwsh
        run: Compress-Archive -Path publish/* -DestinationPath KeyOverlay-${{ github.ref_name }}-win-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: KeyOverlay-${{ github.ref_name }}-win-x64.zip
          generate_release_notes: true
